<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P.O.D Tool for TIF</title>
    <style>
        :root {
            --bg-color: #0d0d11;
            --sidebar-color: #16161f;
            --panel-item-bg: #20202b;
            --text-color: #e2e8f0;
            --text-muted: #70778b;
            --accent-color: #6366f1;
            --border-color: #262636;
            --danger-color: #f43f5e;
            --success-color: #10b981;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- COMPACT SIDEBAR LAYOUT --- */
        #sidebar {
            width: 320px;
            background-color: var(--sidebar-color);
            border-right: 1px solid var(--border-color);
            padding: 16px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            z-index: 10;
        }

        h2 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #fff;
        }

        .section-title {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 10px 0 2px 0;
            font-weight: 700;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        label {
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 600;
        }

        input[type="text"], textarea, input[type="file"], select {
            background: var(--panel-item-bg);
            border: 1px solid var(--border-color);
            padding: 8px 10px;
            border-radius: 6px;
            color: #fff;
            font-size: 0.85rem;
            outline: none;
            font-family: inherit;
            width: 100%;
            box-sizing: border-box;
            transition: border-color 0.15s;
        }

        textarea {
            resize: vertical;
            min-height: 48px;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--accent-color);
        }

        .font-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 6px;
        }

        .font-selector-wrapper {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 6px;
            align-items: center;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s;
        }

        button:hover:not(:disabled) {
            opacity: 0.9;
        }

        #removeFontBtn {
            background-color: var(--panel-item-bg);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 12px;
            font-weight: bold;
        }
        #removeFontBtn:hover:not(:disabled) {
            background-color: var(--danger-color);
            color: #fff;
            border-color: var(--danger-color);
        }
        #removeFontBtn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        #layer-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-height: 80px;
            max-height: 140px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            padding: 6px;
            border-radius: 6px;
            background: #09090d;
            box-sizing: border-box;
        }

        .empty-layers-placeholder {
            color: #475569;
            font-size: 0.8rem;
            text-align: center;
            margin: auto;
            font-style: italic;
        }

        .layer-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            background: var(--panel-item-bg);
            border-radius: 5px;
            cursor: pointer;
            border: 1px solid transparent;
            font-size: 0.8rem;
        }

        .layer-item.active {
            border-color: var(--accent-color);
            background: #1e1b4b;
        }

        .layer-item span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 180px;
        }

        .delete-layer-btn {
            background: transparent;
            color: var(--text-muted);
            padding: 2px 6px;
            font-size: 0.7rem;
        }
        .delete-layer-btn:hover {
            background: var(--danger-color);
            color: white;
        }

        #addLayerBtn {
            background-color: #2563eb;
            padding: 8px;
            font-size: 0.8rem;
        }

        .export-row {
            margin-top: auto;
            display: grid;
            grid-template-columns: 75px 1fr;
            gap: 6px;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
        }

        #exportBtn {
            background-color: var(--success-color);
        }
        #exportBtn:disabled {
            background-color: #1e293b;
            color: #64748b;
            cursor: not-allowed;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-color);
            margin: 4px 0;
        }

        /* --- INTERACTIVE VIEWPORT ENGINE OVERLAYS --- */
        #preview-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #060608;
            position: relative;
            user-select: none;
            overflow: hidden;
        }

        #canvas-wrapper {
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            transform-origin: center center;
        }

        canvas {
            display: block;
        }

        #drop-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(99, 102, 241, 0.1);
            border: 2px dashed var(--accent-color);
            box-sizing: border-box;
            display: none;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(2px);
        }

        /* Floating Viewport Tool HUD */
        .viewport-hud {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(22, 22, 31, 0.85);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(8px);
            padding: 6px 10px;
            border-radius: 30px;
            display: flex;
            gap: 6px;
            align-items: center;
            z-index: 50;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .viewport-hud button {
            background: transparent;
            color: #94a3b8;
            padding: 6px 10px;
            font-size: 0.8rem;
            border-radius: 20px;
        }

        .viewport-hud button:hover {
            background: var(--panel-item-bg);
            color: #fff;
        }

        .viewport-hud .divider {
            width: 1px;
            height: 16px;
            background: var(--border-color);
            margin: 0 4px;
        }

        .hud-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            padding: 0 4px;
        }
    </style>
</head>
<body>

    <div id="drop-overlay">Drop Image Here to Load</div>

    <div id="sidebar">
        <h2>P.O.D Tool for TIF</h2>
        <a>made with love: gerreme </a>
        <div class="control-group">
            <label>Target File Source</label>
            <input type="file" id="imageLoader" accept="image/*">
        </div>

        <div class="section-title">Layers</div>
        <div id="layer-container">
            <div class="empty-layers-placeholder">Import image to begin customization</div>
        </div>
        <button type="button" id="addLayerBtn">+ Add Text Layer</button>

        <div class="section-title">Typography & Properties</div>

        <div class="control-group">
            <label>Watermark Value</label>
            <textarea id="watermarkText" placeholder="Type text context..."></textarea>
        </div>

        <div class="control-group">
            <label>Fetch Google Font</label>
            <div class="font-row">
                <input type="text" id="gFontInput" placeholder="e.g., Montserrat, Poppins">
                <button type="button" id="loadGFontBtn">Load</button>
            </div>
        </div>

        <div class="grid-2">
            <div class="control-group">
                <label>Upload Font File</label>
                <input type="file" id="fontUploader" accept=".ttf,.otf,.woff,.woff2" style="padding:5px; font-size:0.75rem;">
            </div>
            <div class="control-group">
                <label>Color Profile</label>
                <select id="fontColor">
                    <option value="#ffffff">White</option>
                    <option value="#000000">Black</option>
                    <option value="#f59e0b">Gold</option>
                    <option value="#ef4444">Red</option>
                    <option value="#3b82f6">Blue</option>
                </select>
            </div>
        </div>

        <div class="control-group">
            <label>Active Typeface Asset</label>
            <div class="font-selector-wrapper">
                <select id="fontFamily">
                    <option value="Arial" data-system="true">Sans-Serif (Arial)</option>
                    <option value="Georgia" data-system="true">Serif (Georgia)</option>
                    <option value="Courier New" data-system="true">Monospace</option>
                </select>
                <button type="button" id="removeFontBtn" title="Delete from system storage">✕</button>
            </div>
        </div>

        <div class="grid-2">
            <div class="control-group">
                <label>Size</label>
                <input type="range" id="sizeRange" min="10" max="200" value="40">
            </div>
            <div class="control-group">
                <label>Opacity</label>
                <input type="range" id="opacityRange" min="0" max="1" step="0.05" value="0.8">
            </div>
        </div>

        <div class="control-group">
            <label>Text Rotation (Degrees)</label>
            <input type="range" id="rotateRange" min="-180" max="180" value="0">
        </div>

        <div class="export-row">
            <select id="exportFormat">
                <option value="image/png">.PNG</option>
                <option value="image/jpeg">.JPG</option>
            </select>
            <button id="exportBtn" disabled>Export Master</button>
        </div>
    </div>

    <div id="preview-container">
        <div class="viewport-hud">
            <span class="hud-hint">Image Viewport:</span>
            <button id="hudZoomIn" title="Zoom In">+</button>
            <button id="hudZoomOut" title="Zoom Out">−</button>
            <button id="hudRotLeft" title="Rotate Counter-Clockwise">⟲</button>
            <button id="hudRotRight" title="Rotate Clockwise">⟳</button>
            <div class="divider"></div>
            <button id="hudReset" style="color: var(--accent-color);">Reset Layout</button>
        </div>

        <div id="canvas-wrapper">
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const canvasWrapper = document.getElementById('canvas-wrapper');
        const dropOverlay = document.getElementById('drop-overlay');
        const previewContainer = document.getElementById('preview-container');

        // UI inputs
        const imageLoader = document.getElementById('imageLoader');
        const watermarkText = document.getElementById('watermarkText');
        const sizeRange = document.getElementById('sizeRange');
        const rotateRange = document.getElementById('rotateRange');
        const opacityRange = document.getElementById('opacityRange');
        const fontFamily = document.getElementById('fontFamily');
        const fontColor = document.getElementById('fontColor');
        const gFontInput = document.getElementById('gFontInput');
        const loadGFontBtn = document.getElementById('loadGFontBtn');
        const fontUploader = document.getElementById('fontUploader');
        const exportBtn = document.getElementById('exportBtn');
        const exportFormat = document.getElementById('exportFormat');
        const layerContainer = document.getElementById('layer-container');
        const addLayerBtn = document.getElementById('addLayerBtn');
        const removeFontBtn = document.getElementById('removeFontBtn');

        // Viewport Action Buttons
        const hudZoomIn = document.getElementById('hudZoomIn');
        const hudZoomOut = document.getElementById('hudZoomOut');
        const hudRotLeft = document.getElementById('hudRotLeft');
        const hudRotRight = document.getElementById('hudRotRight');
        const hudReset = document.getElementById('hudReset');

        let img = new Image();
        let currentImgSrc = null; 
        let layers = [];
        let activeLayerId = null;

        // Interactive Tracking Matrices
        let isDraggingText = false;
        let isPanningCanvas = false;

        // Canvas Viewport Transforms State Machine
        let canvasScale = 1;
        let canvasPanX = 0;
        let canvasPanY = 0;
        let canvasRotation = 0; // Degrees

        let startX, startY; // Workspace coordinates cache pointers

        // --- BACKGROUND TRANSFORM WORKER LOOPS ---
        function applyTransformations() {
            canvasWrapper.style.transform = `translate(${canvasPanX}px, ${canvasPanY}px) scale(${canvasScale}) rotate(${canvasRotation}deg)`;
        }

        hudZoomIn.addEventListener('click', () => { canvasScale = Math.min(4, canvasScale + 0.15); applyTransformations(); });
        hudZoomOut.addEventListener('click', () => { canvasScale = Math.max(0.2, canvasScale - 0.15); applyTransformations(); });
        hudRotLeft.addEventListener('click', () => { canvasRotation -= 15; applyTransformations(); });
        hudRotRight.addEventListener('click', () => { canvasRotation += 15; applyTransformations(); });
        hudReset.addEventListener('click', () => {
            canvasScale = 1;
            canvasPanX = 0;
            canvasPanY = 0;
            canvasRotation = 0;
            applyTransformations();
        });

        // Track Zoom via Mouse Scroll Wheel
        previewContainer.addEventListener('wheel', (e) => {
            if (!img.src) return;
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.08 : 0.08;
            canvasScale = Math.max(0.15, Math.min(5, canvasScale + delta));
            applyTransformations();
        }, { passive: false });

        // --- LOCAL STORAGE FONTS ENGINE ---
        function getSavedFonts() {
            const saved = localStorage.getItem('wms_saved_gfonts');
            return saved ? JSON.parse(saved) : [];
        }

        function saveFontToLocalStorage(fontName) {
            let fonts = getSavedFonts();
            if (!fonts.includes(fontName)) {
                fonts.push(fontName);
                localStorage.setItem('wms_saved_gfonts', JSON.stringify(fonts));
            }
        }

        function removeFontFromLocalStorage(fontName) {
            let fonts = getSavedFonts();
            fonts = fonts.filter(f => f !== fontName);
            localStorage.setItem('wms_saved_gfonts', JSON.stringify(fonts));
        }

        function injectGoogleFontDOM(fontName) {
            const idSafe = fontName.replace(/ /g, '-');
            const existingLink = document.getElementById(`gfont-link-${idSafe}`);
            if (!existingLink) {
                const link = document.createElement('link');
                link.id = `gfont-link-${idSafe}`;
                link.rel = 'stylesheet';
                link.href = `https://fonts.googleapis.com/css2?family=${fontName.replace(/ /g, '+')}&display=swap`;
                document.head.appendChild(link);
            }

            let choiceExists = false;
            for (let opt of fontFamily.options) {
                if (opt.value === fontName) { choiceExists = true; break; }
            }

            if (!choiceExists) {
                const option = document.createElement('option');
                option.value = fontName;
                option.textContent = `Google: ${fontName}`;
                fontFamily.appendChild(option);
            }
        }

        function loadSavedFontsOnStartup() {
            const fonts = getSavedFonts();
            fonts.forEach(font => injectGoogleFontDOM(font));
            toggleRemoveFontButtonState();
        }

        function toggleRemoveFontButtonState() {
            const selectedOption = fontFamily.options[fontFamily.selectedIndex];
            if (selectedOption && selectedOption.hasAttribute('data-system')) {
                removeFontBtn.disabled = true;
            } else {
                removeFontBtn.disabled = false;
            }
        }

        removeFontBtn.addEventListener('click', () => {
            const index = fontFamily.selectedIndex;
            const targetFont = fontFamily.value;
            const selectedOption = fontFamily.options[index];

            if (selectedOption && selectedOption.hasAttribute('data-system')) return;

            fontFamily.remove(index);
            removeFontFromLocalStorage(targetFont);

            const linkNode = document.getElementById(`gfont-link-${targetFont.replace(/ /g, '-')}`);
            if (linkNode) linkNode.remove();

            layers.forEach(l => {
                if (l.fontFamily === targetFont) l.fontFamily = "Arial";
            });

            fontFamily.value = "Arial";
            syncActiveLayerFromUI();
            toggleRemoveFontButtonState();
            drawAll();
        });

        fontFamily.addEventListener('change', () => {
            toggleRemoveFontButtonState();
            syncActiveLayerFromUI();
            drawAll();
        });

        function createLayer(text = "Watermark Signature", x = 50, y = 50) {
            return {
                id: Date.now() + Math.random().toString(36).substr(2, 5),
                text: text,
                xPercent: x,
                yPercent: y,
                size: 40,
                rotation: 0,
                opacity: 0.8,
                fontFamily: fontFamily.value || "Arial",
                fontColor: fontColor.value || "#ffffff"
            };
        }

        function updateEditorUI() {
            const activeLayer = layers.find(l => l.id === activeLayerId);
            if (!activeLayer) {
                watermarkText.value = "";
                return;
            }

            watermarkText.value = activeLayer.text;
            sizeRange.value = activeLayer.size;
            rotateRange.value = activeLayer.rotation;
            opacityRange.value = activeLayer.opacity;
            fontFamily.value = activeLayer.fontFamily;
            fontColor.value = activeLayer.fontColor;
            toggleRemoveFontButtonState();
        }

        function renderLayerList() {
            layerContainer.innerHTML = "";
            if (layers.length === 0) {
                layerContainer.innerHTML = '<div class="empty-layers-placeholder">No layers added yet</div>';
                return;
            }

            layers.forEach((layer, index) => {
                const item = document.createElement('div');
                item.className = `layer-item ${layer.id === activeLayerId ? 'active' : ''}`;
                item.onclick = () => {
                    activeLayerId = layer.id;
                    updateEditorUI();
                    renderLayerList();
                    drawAll();
                };

                const title = document.createElement('span');
                title.textContent = `${index + 1}. ${layer.text.split('\n')[0] || 'Empty Text'}`;
                
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-layer-btn';
                delBtn.textContent = '✕';
                delBtn.type = 'button';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    layers = layers.filter(l => l.id !== layer.id);
                    if (activeLayerId === layer.id) {
                        activeLayerId = layers.length ? layers[0].id : null;
                    }
                    updateEditorUI();
                    renderLayerList();
                    drawAll();
                };

                item.appendChild(title);
                item.appendChild(delBtn);
                layerContainer.appendChild(item);
            });
        }

        addLayerBtn.addEventListener('click', () => {
            const newLayer = createLayer("Watermark Text Layer", 50, 40 + (layers.length * 8) % 40);
            layers.push(newLayer);
            activeLayerId = newLayer.id;
            updateEditorUI();
            renderLayerList();
            drawAll();
        });

        function syncActiveLayerFromUI() {
            const activeLayer = layers.find(l => l.id === activeLayerId);
            if (!activeLayer) return;

            activeLayer.text = watermarkText.value;
            activeLayer.size = parseInt(sizeRange.value);
            activeLayer.rotation = parseInt(rotateRange.value);
            activeLayer.opacity = parseFloat(opacityRange.value);
            activeLayer.fontFamily = fontFamily.value;
            activeLayer.fontColor = fontColor.value;
        }

        [watermarkText, sizeRange, rotateRange, opacityRange, fontColor].forEach(el => {
            el.addEventListener('input', () => {
                syncActiveLayerFromUI();
                if (el === watermarkText) renderLayerList();
                drawAll();
            });
        });

        function loadImageFromBlob(file) {
            if (!file || !file.type.startsWith('image/')) return;
            if (currentImgSrc) URL.revokeObjectURL(currentImgSrc);
            
            currentImgSrc = URL.createObjectURL(file);
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                
                if (layers.length === 0) {
                    const defaultLayer = createLayer("John Doe\nDigital Signature", 50, 50);
                    layers.push(defaultLayer);
                    activeLayerId = defaultLayer.id;
                }
                
                updateEditorUI();
                renderLayerList();
                drawAll();
                exportBtn.disabled = false;
                
                // Autofit resets on completely new image asset allocations
                canvasScale = 1;
                canvasPanX = 0;
                canvasPanY = 0;
                canvasRotation = 0;
                applyTransformations();
            }
            img.src = currentImgSrc;
        }

        imageLoader.addEventListener('change', (e) => loadImageFromBlob(e.target.files[0]));

        window.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    loadImageFromBlob(items[i].getAsFile());
                    break;
                }
            }
        });

        window.addEventListener('dragover', (e) => { e.preventDefault(); dropOverlay.style.display = 'flex'; });
        window.addEventListener('dragleave', (e) => { if (e.clientX === 0 && e.clientY === 0) dropOverlay.style.display = 'none'; });
        dropOverlay.addEventListener('click', () => { dropOverlay.style.display = 'none'; });
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            dropOverlay.style.display = 'none';
            if (e.dataTransfer.files.length > 0) loadImageFromBlob(e.dataTransfer.files[0]);
        });

        loadGFontBtn.addEventListener('click', () => {
            const fontName = gFontInput.value.trim();
            if (!fontName) return;
            injectGoogleFontDOM(fontName);
            saveFontToLocalStorage(fontName);
            fontFamily.value = fontName;
            gFontInput.value = "";
            syncActiveLayerFromUI();
            toggleRemoveFontButtonState();
            setTimeout(drawAll, 800);
        });

        fontUploader.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const fontName = file.name.split('.')[0].replace(/[^a-zA-Z0-9]/g, '');
            const reader = new FileReader();
            
            reader.onload = async (event) => {
                const fontFace = new FontFace(fontName, event.target.result);
                try {
                    const loadedFace = await fontFace.load();
                    document.fonts.add(loadedFace);
                    const option = document.createElement('option');
                    option.value = fontName;
                    option.textContent = `Local: ${file.name}`;
                    fontFamily.appendChild(option);
                    fontFamily.value = fontName;
                    syncActiveLayerFromUI();
                    toggleRemoveFontButtonState();
                    drawAll();
                } catch (err) {
                    alert("Error processing your font file layout.");
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // Core Render Matrix Engine Loop
        function drawAll(isExportingJpg = false) {
            if (!img.src) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (isExportingJpg) {
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            ctx.drawImage(img, 0, 0);

            layers.forEach(layer => {
                ctx.save();
                const xPos = (layer.xPercent / 100) * canvas.width;
                const yPos = (layer.yPercent / 100) * canvas.height;

                ctx.translate(xPos, yPos);
                ctx.rotate((layer.rotation * Math.PI) / 180);
                ctx.globalAlpha = layer.opacity;

                ctx.font = `${layer.size}px "${layer.fontFamily}"`;
                ctx.fillStyle = layer.fontColor;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                const lines = layer.text.split('\n');
                const lineHeight = layer.size * 1.2; 
                const totalHeight = lineHeight * (lines.length - 1);
                
                lines.forEach((line, index) => {
                    const lineY = (index * lineHeight) - (totalHeight / 2);
                    ctx.fillText(line, 0, lineY);
                });

                if (layer.id === activeLayerId && !isExportingJpg) {
                    ctx.beginPath();
                    ctx.arc(0, 0, 6, 0, 2 * Math.PI);
                    ctx.fillStyle = '#6366f1';
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2;
                    ctx.fill();
                    ctx.stroke();
                }
                ctx.restore();
            });
        }

        // --- COORDINATE MATRIX TRANSFORMATION RESOLVER ---
        function getCanvasMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            
            // Unwind structural DOM metrics factoring current transform steps cleanly
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            // Calculate positional variables relative to center of the canvas element context bounds
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            let rx = clientX - cx;
            let ry = clientY - cy;

            // Unwind Rotation factor
            const rad = (-canvasRotation * Math.PI) / 180;
            const rotX = rx * Math.cos(rad) - ry * Math.sin(rad);
            const rotY = rx * Math.sin(rad) + ry * Math.cos(rad);

            // Factor structural Scale metrics safely
            const unscaledX = rotX / canvasScale;
            const unscaledY = rotY / canvasScale;

            return {
                x: unscaledX + canvas.width / 2,
                y: unscaledY + canvas.height / 2
            };
        }

        // --- GLOBAL WORKSPACE EVENT MUXING CONTROLLERS ---
        function handleStart(e) {
            if (!img.src) return;

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            startX = clientX;
            startY = clientY;

            // Shift Key or Middle-click triggers Viewport Panning immediately
            if (e.shiftKey || e.button === 1 || e.target === previewContainer) {
                isPanningCanvas = true;
                previewContainer.style.cursor = 'grabbing';
                return;
            }

            if (layers.length === 0) return;
            
            const pos = getCanvasMousePos(e);
            let closestLayer = null;
            let minDist = 80 / canvasScale; // Compensate selection range thresholds based on Zoom configuration factors

            layers.forEach(layer => {
                const lx = (layer.xPercent / 100) * canvas.width;
                const ly = (layer.yPercent / 100) * canvas.height;
                const dist = Math.sqrt((pos.x - lx) ** 2 + (pos.y - ly) ** 2);
                if (dist < minDist) { minDist = dist; closestLayer = layer; }
            });

            if (closestLayer) {
                activeLayerId = closestLayer.id;
                isDraggingText = true;
                canvasWrapper.style.cursor = 'grabbing';
                updateEditorUI();
                renderLayerList();
                drawAll();
            } else {
                // Clicking on empty spots triggers background image panning
                isPanningCanvas = true;
                previewContainer.style.cursor = 'grabbing';
            }
        }

        function handleMove(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            if (isPanningCanvas) {
                e.preventDefault();
                const dx = clientX - startX;
                const dy = clientY - startY;
                canvasPanX += dx;
                canvasPanY += dy;
                startX = clientX;
                startY = clientY;
                applyTransformations();
                return;
            }

            if (!isDraggingText) return;
            e.preventDefault();
            
            const pos = getCanvasMousePos(e);
            const activeLayer = layers.find(l => l.id === activeLayerId);
            if (activeLayer) {
                activeLayer.xPercent = Math.max(0, Math.min(100, (pos.x / canvas.width) * 100));
                activeLayer.yPercent = Math.max(0, Math.min(100, (pos.y / canvas.height) * 100));
                drawAll();
            }
        }

        function handleEnd() {
            isDraggingText = false;
            isPanningCanvas = false;
            previewContainer.style.cursor = 'default';
            canvasWrapper.style.cursor = 'default';
        }

        // Attach Multi-Mux System listeners
        canvasWrapper.addEventListener('mousedown', handleStart);
        previewContainer.addEventListener('mousedown', handleStart);
        
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        canvasWrapper.addEventListener('touchstart', handleStart, { passive: false });
        previewContainer.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);

        // PRODUCTION EXPORT DRIVER
        exportBtn.addEventListener('click', () => {
            if (!img.src) return;
            try {
                const currentActiveId = activeLayerId;
                const format = exportFormat.value; 
                const isJpg = (format === 'image/jpeg');

                activeLayerId = null; 
                drawAll(isJpg);
                
                const ext = isJpg ? 'jpg' : 'png';
                const link = document.createElement('a');
                link.download = `watermarked_output.${ext}`;
                link.href = canvas.toDataURL(format, isJpg ? 0.95 : undefined); 
                link.click();
                
                activeLayerId = currentActiveId;
                drawAll(false);
            } catch (error) {
                console.error("Export failed:", error);
                alert("Security block encountered during file processing.");
            }
        });
        
        loadSavedFontsOnStartup();
        renderLayerList();
    </script>
</body>
</html>
